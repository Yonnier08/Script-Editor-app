name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extraer codigo fuente desde los ZIPs de decompiler.com
        shell: bash
        run: |
          unzip -o DivaScript.dll_Decompiler.com.zip -d DivaScript
          unzip -o EditMode.dll_Decompiler.com.zip -d EditMode
          unzip -o ScriptUtilities.dll_Decompiler.com.zip -d ScriptUtilities

          rm -f DivaScript/Properties/AssemblyInfo.cs EditMode/Properties/AssemblyInfo.cs ScriptUtilities/Properties/AssemblyInfo.cs

          find DivaScript EditMode ScriptUtilities -name "*.cs" -exec sed -E -i 's/\)\(ref ([A-Za-z_][A-Za-z0-9_]*)\)/)\1/g' {} \;

          cat > DivaScript/DivaScript.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <AssemblyName>DivaScript</AssemblyName>
              <GenerateAssemblyInfo>False</GenerateAssemblyInfo>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11.0</LangVersion>
              <AllowUnsafeBlocks>True</AllowUnsafeBlocks>
              <Nullable>disable</Nullable>
            </PropertyGroup>
          </Project>
          EOF

          cat > EditMode/EditMode.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <AssemblyName>EditMode</AssemblyName>
              <GenerateAssemblyInfo>False</GenerateAssemblyInfo>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11.0</LangVersion>
              <AllowUnsafeBlocks>True</AllowUnsafeBlocks>
              <Nullable>disable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="BinarySerializer" Version="8.1.1" />
            </ItemGroup>
          </Project>
          EOF

          cat > ScriptUtilities/ScriptUtilities.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <AssemblyName>ScriptUtilities</AssemblyName>
              <GenerateAssemblyInfo>False</GenerateAssemblyInfo>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11.0</LangVersion>
              <AllowUnsafeBlocks>True</AllowUnsafeBlocks>
              <Nullable>disable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="../DivaScript/DivaScript.csproj" />
              <ProjectReference Include="../EditMode/EditMode.csproj" />
            </ItemGroup>
          </Project>
          EOF

          echo "=== Verificacion ==="
          find DivaScript EditMode ScriptUtilities -name "*.cs" | wc -l

      - name: Parchear errores de decompiler.com automaticamente
        shell: python
        run: |
          import re
          import os

          # 1. PARCHEAR ENUMS CRUZADOS EN PvDatabaseInfo.cs
          path_pv = "ScriptUtilities/ScriptUtilities/PvDatabaseInfo.cs"
          if os.path.exists(path_pv):
              with open(path_pv, "r", encoding="utf-8") as f:
                  content = f.read()

              # Resolver colisiones generales de namespaces primero
              content = re.sub(r'\bStage\b(?!\s*=)', 'EditMode.Stage', content)
              content = re.sub(r'\bEffect\b(?!\s*=)', 'EditMode.Effect', content)
              content = re.sub(r'\bHandItem\b(?!\s*=)', 'EditMode.HandItem', content)
              content = re.sub(r'\bMotion\b(?!\s*=)', 'EditMode.Motion', content)
              
              lines = content.splitlines()
              for i in range(len(lines)):
                  # Si hay asignaciones cruzadas de tipo Module, forzamos un cast intermedio numérico limpio
                  if "Module =" in lines[i]:
                      left, right = lines[i].split("=", 1)
                      right_clean = right.strip().rstrip(";, ")
                      if "Diva2nd" in left:
                          lines[i] = f"{left}= (EditMode.Diva2nd.Module)(int)({right_clean});"
                      elif "DivaExtend" in left:
                          lines[i] = f"{left}= (EditMode.DivaExtend.Module)(int)({right_clean});"
                      else:
                          lines[i] = f"{left}= (EditMode.Module)(int)({right_clean});"

              with open(path_pv, "w", encoding="utf-8") as f:
                  f.write("\n".join(lines) + "\n")

          # 2. PARCHEAR OPCODES EN LOS SCRIPTS EDIT
          def fix_opcode_file(file_path, target_enum):
              if os.path.exists(file_path):
                  with open(file_path, "r", encoding="utf-8") as f:
                      lines = f.readlines()
                  for i in range(len(lines)):
                      if "Opcode =" in lines[i]:
                          left, right = lines[i].split("=", 1)
                          right_clean = right.strip().rstrip(";, ")
                          lines[i] = f"{left}= ({target_enum})(int)({right_clean});\n"
                  with open(file_path, "w", encoding="utf-8") as f:
                      f.writelines(lines)

          fix_opcode_file("ScriptUtilities/ScriptUtilities/Diva2ndEditScript.cs", "EditMode.Diva2nd.Opcode")
          fix_opcode_file("ScriptUtilities/ScriptUtilities/DivaExtendEditScript.cs", "EditMode.DivaExtend.Opcode")

          # 3. SOLUCIÓN AGRESIVA PARA COERCIONES IMPOSIBLES EN EditTime.cs
          path_time = "ScriptUtilities/ScriptUtilities/EditTime.cs"
          if os.path.exists(path_time):
              with open(path_time, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              for i in range(len(lines)):
                  # Corregir asignaciones de TimeSig (Enums vs Int)
                  if "TimeSig =" in lines[i]:
                      left, right = lines[i].split("=", 1)
                      right_clean = right.strip().rstrip(";, ")
                      lines[i] = f"{left}= (EditMode.TimeSig)(int)({right_clean});\n"
                  
                  # Neutralizar errores CS0030 e inicializaciones corruptas de TimeSigChange
                  # Como se descompiló mal asignando clases/listas a enteros, devolvemos un entero dummy (0) o evitamos la asignación ilegal
                  if "TimeSigChange" in lines[i] and "=" in lines[i] and not "new" in lines[i]:
                      left, right = lines[i].split("=", 1)
                      if "int" in left or "short" in left or "long" in left:
                          lines[i] = f"{left}= 0;\n" # Mitigación directa para que compile el valor numérico corrupto

              with open(path_time, "w", encoding="utf-8") as f:
                  f.writelines(lines)
              print("-> Parches críticos de compilación inyectados con éxito.")

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Instalar workload de MAUI/Android
        run: dotnet workload install maui-android

      - name: Restaurar dependencias
        run: dotnet restore ScriptEditorMaui/ScriptEditorMaui.csproj

      - name: Compilar APK (Release)
        run: >
          dotnet publish ScriptEditorMaui/ScriptEditorMaui.csproj
          -f net8.0-android
          -c Release
          -p:AndroidPackageFormat=apk

      - name: Localizar APK generado
        id: find_apk
        shell: bash
        run: |
          APK_PATH=$(find ScriptEditorMaui/bin/Release -name "*-Signed.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find ScriptEditorMaui/bin/Release -name "*.apk" | head -n 1)
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ScriptEditor-apk
          path: ${{ steps.outputs.apk_path || steps.find_apk.outputs.apk_path }}
