name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extraer codigo fuente desde los ZIPs de decompiler.com
        shell: bash
        run: |
          unzip -o DivaScript.dll_Decompiler.com.zip -d DivaScript
          unzip -o EditMode.dll_Decompiler.com.zip -d EditMode
          unzip -o ScriptUtilities.dll_Decompiler.com.zip -d ScriptUtilities

          rm -f DivaScript/Properties/AssemblyInfo.cs EditMode/Properties/AssemblyInfo.cs ScriptUtilities/Properties/AssemblyInfo.cs

          find DivaScript EditMode ScriptUtilities -name "*.cs" -exec sed -E -i 's/\)\(ref ([A-Za-z_][A-Za-z0-9_]*)\)/)\1/g' {} \;

          cat > DivaScript/DivaScript.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <AssemblyName>DivaScript</AssemblyName>
              <GenerateAssemblyInfo>False</GenerateAssemblyInfo>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11.0</LangVersion>
              <AllowUnsafeBlocks>True</AllowUnsafeBlocks>
              <Nullable>disable</Nullable>
            </PropertyGroup>
          </Project>
          EOF

          cat > EditMode/EditMode.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <AssemblyName>EditMode</AssemblyName>
              <GenerateAssemblyInfo>False</GenerateAssemblyInfo>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11.0</LangVersion>
              <AllowUnsafeBlocks>True</AllowUnsafeBlocks>
              <Nullable>disable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="BinarySerializer" Version="8.1.1" />
            </ItemGroup>
          </Project>
          EOF

          cat > ScriptUtilities/ScriptUtilities.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <AssemblyName>ScriptUtilities</AssemblyName>
              <GenerateAssemblyInfo>False</GenerateAssemblyInfo>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11.0</LangVersion>
              <AllowUnsafeBlocks>True</AllowUnsafeBlocks>
              <Nullable>disable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="../DivaScript/DivaScript.csproj" />
              <ProjectReference Include="../EditMode/EditMode.csproj" />
            </ItemGroup>
          </Project>
          EOF

          echo "=== Verificacion ==="
          find DivaScript EditMode ScriptUtilities -name "*.cs" | wc -l

      - name: Corregir ambiguedades de namespace en PvDatabaseInfo.cs
        shell: python
        run: |
          import re

          path = "ScriptUtilities/ScriptUtilities/PvDatabaseInfo.cs"
          with open(path) as f:
              lines = f.readlines()

          regions = [
              (93, 108, "base"),
              (111, 153, "Diva2nd"),
              (155, 197, "DivaExtend"),
              (199, 446, "base"),
              (447, 809, "base"),
              (810, 1008, "Diva2nd"),
              (1009, 1207, "DivaExtend"),
              (1208, 1265, "base"),
              (1266, 1287, "Diva2nd"),
              (1288, 1309, "DivaExtend"),
              (1310, 1339, "base"),
              (1340, 1349, "base"),
              (1350, 1359, "Diva2nd"),
              (1360, 1369, "DivaExtend"),
          ]

          ns_map = {
              "base": "EditMode",
              "Diva2nd": "EditMode.Diva2nd",
              "DivaExtend": "EditMode.DivaExtend",
          }

          tokens = ["Edit", "Stage", "Effect", "HandItem", "Motion", "Module", "StageBack"]

          def qualify_line(line, flavor):
              ns = ns_map[flavor]
              for tok in tokens:
                  line = re.sub(r'(?<!\.)\b' + tok + r'\b', ns + "." + tok, line)
              line = re.sub(r'\(SeName\)', '(' + ns + '.SeName)', line)
              line = re.sub(r'(?<!\.)\bSeName\b(\s+buttonSound)', ns + '.SeName' + r'\1', line)
              return line

          for start, end, flavor in regions:
              for i in range(start - 1, end):
                  lines[i] = qualify_line(lines[i], flavor)

          ns_map2 = {"Diva2nd": "EditMode.Diva2nd", "DivaExtend": "EditMode.DivaExtend", "base": "EditMode"}
          prop_tokens = ["Stage", "Effect", "HandItem", "Motion"]
          pattern = re.compile(r'public List<(\w+)> (\w+) \{ get; set; \} = new List<(\w+)>\(\);')

          for i in range(43, 92):
              line = lines[i]
              m = pattern.search(line)
              if m and m.group(1) in prop_tokens:
                  name = m.group(2)
                  if name.startswith("Diva2nd"):
                      flavor = "Diva2nd"
                  elif name.startswith("DivaExtend"):
                      flavor = "DivaExtend"
                  else:
                      flavor = "base"
                  ns = ns_map2[flavor]
                  tok = m.group(1)
                  lines[i] = line.replace(f"List<{tok}>", f"List<{ns}.{tok}>")

          with open(path, "w") as f:
              f.writelines(lines)

          # Fix: Module siempre es la base (Performer.PvCostume no varia por juego)
          content = open(path).read()
          content = content.replace("EditMode.Diva2nd.Module", "EditMode.Module")
          content = content.replace("EditMode.DivaExtend.Module", "EditMode.Module")
          with open(path, "w") as f:
              f.write(content)

          # Fix: decompiler.com perdio un cast (int) en el switch, rompiendo el tipo del switch
          for fname in ["ScriptUtilities/ScriptUtilities/Diva2ndEditScript.cs", "ScriptUtilities/ScriptUtilities/DivaExtendEditScript.cs"]:
              c = open(fname).read()
              c = c.replace("switch (val2 - 31)", "switch ((int)val2 - 31)")
              with open(fname, "w") as f:
                  f.write(c)

          print("PvDatabaseInfo.cs y switches corregidos")

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Instalar workload de MAUI/Android
        run: dotnet workload install maui-android

      - name: Restaurar dependencias
        run: dotnet restore ScriptEditorMaui/ScriptEditorMaui.csproj

      - name: Compilar APK (Release)
        run: >
          dotnet publish ScriptEditorMaui/ScriptEditorMaui.csproj
          -f net8.0-android
          -c Release
          -p:AndroidPackageFormat=apk

      - name: Localizar APK generado
        id: find_apk
        shell: bash
        run: |
          APK_PATH=$(find ScriptEditorMaui/bin/Release -name "*-Signed.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find ScriptEditorMaui/bin/Release -name "*.apk" | head -n 1)
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ScriptEditor-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
