name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extraer codigo fuente desde los ZIPs de decompiler.com
        shell: bash
        run: |
          unzip -o DivaScript.dll_Decompiler.com.zip -d DivaScript
          unzip -o EditMode.dll_Decompiler.com.zip -d EditMode
          unzip -o ScriptUtilities.dll_Decompiler.com.zip -d ScriptUtilities

          rm -f DivaScript/Properties/AssemblyInfo.cs EditMode/Properties/AssemblyInfo.cs ScriptUtilities/Properties/AssemblyInfo.cs

          find DivaScript EditMode ScriptUtilities -name "*.cs" -exec sed -E -i 's/\)\(ref ([A-Za-z_][A-Za-z0-9_]*)\)/)\1/g' {} \;

          cat > DivaScript/DivaScript.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <AssemblyName>DivaScript</AssemblyName>
              <GenerateAssemblyInfo>False</GenerateAssemblyInfo>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11.0</LangVersion>
              <AllowUnsafeBlocks>True</AllowUnsafeBlocks>
              <Nullable>disable</Nullable>
            </PropertyGroup>
          </Project>
          EOF

          cat > EditMode/EditMode.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <AssemblyName>EditMode</AssemblyName>
              <GenerateAssemblyInfo>False</GenerateAssemblyInfo>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11.0</LangVersion>
              <AllowUnsafeBlocks>True</AllowUnsafeBlocks>
              <Nullable>disable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="BinarySerializer" Version="8.1.1" />
            </ItemGroup>
          </Project>
          EOF

          cat > ScriptUtilities/ScriptUtilities.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <AssemblyName>ScriptUtilities</AssemblyName>
              <GenerateAssemblyInfo>False</GenerateAssemblyInfo>
              <TargetFramework>net8.0</TargetFramework>
              <LangVersion>11.0</LangVersion>
              <AllowUnsafeBlocks>True</AllowUnsafeBlocks>
              <Nullable>disable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="../DivaScript/DivaScript.csproj" />
              <ProjectReference Include="../EditMode/EditMode.csproj" />
            </ItemGroup>
          </Project>
          EOF

          echo "=== Verificacion ==="
          find DivaScript EditMode ScriptUtilities -name "*.cs" | wc -l

      - name: Parchear errores de decompiler.com automaticamente
        shell: python
        run: |
          import re
          import os

          path_pv = "ScriptUtilities/ScriptUtilities/PvDatabaseInfo.cs"
          if os.path.exists(path_pv):
              with open(path_pv, "r", encoding="utf-8") as f:
                  lines = f.readlines()

              # 1. Resolver tokens estándar por regiones
              regions = [
                  (93, 108, "base"),
                  (111, 153, "Diva2nd"),
                  (155, 197, "DivaExtend"),
                  (199, 446, "base"),
                  (447, 809, "base"),
                  (810, 1008, "Diva2nd"),
                  (1009, 1207, "DivaExtend"),
                  (1208, 1265, "base"),
                  (1266, 1287, "Diva2nd"),
                  (1288, 1309, "DivaExtend"),
                  (1310, 1339, "base"),
                  (1340, 1349, "base"),
                  (1350, 1359, "Diva2nd"),
                  (1360, 1369, "DivaExtend"),
              ]

              ns_map = {
                  "base": "EditMode",
                  "Diva2nd": "EditMode.Diva2nd",
                  "DivaExtend": "EditMode.DivaExtend",
              }

              tokens = ["Stage", "Effect", "HandItem", "Motion", "Module", "StageBack"]

              def qualify_line(line, flavor):
                  ns = ns_map[flavor]
                  if "class PvDatabaseInfo" in line or "public PvDatabaseInfo" in line:
                      return line
                  for tok in tokens:
                      line = re.sub(r'(?<!\.)\b' + tok + r'\b', ns + "." + tok, line)
                  line = re.sub(r'\(SeName\)', '(' + ns + '.SeName)', line)
                  line = re.sub(r'(?<!\.)\bSeName\b(\s+buttonSound)', ns + '.SeName' + r'\1', line)
                  return line

              for start, end, flavor in regions:
                  for i in range(start - 1, end):
                      if i < len(lines):
                          lines[i] = qualify_line(lines[i], flavor)

              # 2. Corregir listas de propiedades iniciales
              ns_map2 = {"Diva2nd": "EditMode.Diva2nd", "DivaExtend": "EditMode.DivaExtend", "base": "EditMode"}
              prop_tokens = ["Stage", "Effect", "HandItem", "Motion"]
              pattern = re.compile(r'public List<(\w+)> (\w+) \{ get; set; \} = new List<(\w+)>\(\);')

              for i in range(43, 92):
                  if i < len(lines):
                      line = lines[i]
                      m = pattern.search(line)
                      if m and m.group(1) in prop_tokens:
                          name = m.group(2)
                          flavor = "Diva2nd" if name.startswith("Diva2nd") else ("DivaExtend" if name.startswith("DivaExtend") else "base")
                          ns = ns_map2[flavor]
                          tok = m.group(1)
                          lines[i] = line.replace(f"List<{tok}>", f"List<{ns}.{tok}>")

              for i in range(43, 92):
                  if i < len(lines):
                      lines[i] = lines[i].replace("public Stage Stage", "public EditMode.Stage Stage")
                      lines[i] = lines[i].replace("public Effect Effect", "public EditMode.Effect Effect")
                      lines[i] = lines[i].replace("public HandItem HandItem", "public EditMode.HandItem HandItem")
                      lines[i] = lines[i].replace("public Motion Motion", "public EditMode.Motion Motion")

              # 3. Ataque quirúrgico al tipo ambiguo 'Edit'
              for start, end, flavor in regions:
                  ns = ns_map[flavor]
                  for i in range(start - 1, end):
                      if i < len(lines):
                          lines[i] = re.sub(r'\bEdit\b(?<!EditMode)', ns + ".Edit", lines[i])

              # 4. SOLUCIÓN RADICAL PARA CRUCE DE ENUMS EN 'Module'
              for i in range(len(lines)):
                  if "Module =" in lines[i] or ".Module =" in lines[i]:
                      # Capturamos dinámicamente todo lo asignado tras el símbolo '='
                      parts = lines[i].split("=", 1)
                      left, right = parts[0], parts[1].strip()
                      # Identificar destino basándonos en el contexto de la línea
                      if "Diva2nd" in left:
                          target_type = "EditMode.Diva2nd.Module"
                      elif "DivaExtend" in left:
                          target_type = "EditMode.DivaExtend.Module"
                      else:
                          target_type = "EditMode.Module"
                      
                      # Quitar el terminador temporal para envolver el valor en un cast numérico intermedio seguro
                      terminator = ";" if right.endswith(";") else ("," if right.endswith(",") else "")
                      clean_right = right.rstrip(";, ")
                      lines[i] = f"{left}= ({target_type})(int)({clean_right}){terminator}\n"

              with open(path_pv, "w", encoding="utf-8") as f:
                  f.writelines(lines)
              print("-> PvDatabaseInfo.cs corregido quirúrgicamente incluyendo tipos Module.")

          # Captura voraz de asignación de Opcode (acepta cualquier método o variable del lado derecho)
          path_2nd = "ScriptUtilities/ScriptUtilities/Diva2ndEditScript.cs"
          if os.path.exists(path_2nd):
              with open(path_2nd, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              for i in range(len(lines)):
                  if "Opcode =" in lines[i]:
                      left, right = lines[i].split("=", 1)
                      terminator = ";" if right.strip().endswith(";") else ("," if right.strip().endswith(",") else "")
                      clean_right = right.strip().rstrip(";, ")
                      lines[i] = f"{left}= (EditMode.Diva2nd.Opcode)({clean_right}){terminator}\n"
              with open(path_2nd, "w", encoding="utf-8") as f:
                  f.writelines(lines)
              print("-> Diva2ndEditScript.cs corregido.")

          path_ext = "ScriptUtilities/ScriptUtilities/DivaExtendEditScript.cs"
          if os.path.exists(path_ext):
              with open(path_ext, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              for i in range(len(lines)):
                  if "Opcode =" in lines[i]:
                      left, right = lines[i].split("=", 1)
                      terminator = ";" if right.strip().endswith(";") else ("," if right.strip().endswith(",") else "")
                      clean_right = right.strip().rstrip(";, ")
                      lines[i] = f"{left}= (EditMode.DivaExtend.Opcode)({clean_right}){terminator}\n"
              with open(path_ext, "w", encoding="utf-8") as f:
                  f.writelines(lines)
              print("-> DivaExtendEditScript.cs corregido.")

          # Corregir de manera absoluta EditTime.cs dividiendo asignaciones de TimeSig
          path_time = "ScriptUtilities/ScriptUtilities/EditTime.cs"
          if os.path.exists(path_time):
              with open(path_time, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              for i in range(len(lines)):
                  if "TimeSig =" in lines[i] or ".TimeSig =" in lines[i]:
                      left, right = lines[i].split("=", 1)
                      terminator = ";" if right.strip().endswith(";") else ("," if right.strip().endswith(",") else "")
                      clean_right = right.strip().rstrip(";, ")
                      # Forzar cast a enum
                      lines[i] = f"{left}= (EditMode.TimeSig)(int)({clean_right}){terminator}\n"
                  elif "TimeSig" in lines[i] and "=" in lines[i]:
                      # Si TimeSig está a la derecha intentando asignarse a un entero
                      left, right = lines[i].split("=", 1)
                      terminator = ";" if right.strip().endswith(";") else ("," if right.strip().endswith(",") else "")
                      clean_right = right.strip().rstrip(";, ")
                      lines[i] = f"{left}= (int)({clean_right}){terminator}\n"
              with open(path_time, "w", encoding="utf-8") as f:
                  f.writelines(lines)
              print("-> EditTime.cs corregido.")

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Instalar workload de MAUI/Android
        run: dotnet workload install maui-android

      - name: Restaurar dependencias
        run: dotnet restore ScriptEditorMaui/ScriptEditorMaui.csproj

      - name: Compilar APK (Release)
        run: >
          dotnet publish ScriptEditorMaui/ScriptEditorMaui.csproj
          -f net8.0-android
          -c Release
          -p:AndroidPackageFormat=apk

      - name: Localizar APK generado
        id: find_apk
        shell: bash
        run: |
          APK_PATH=$(find ScriptEditorMaui/bin/Release -name "*-Signed.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find ScriptEditorMaui/bin/Release -name "*.apk" | head -n 1)
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ScriptEditor-apk
          path: ${{ steps.outputs.apk_path || steps.find_apk.outputs.apk_path }}
          
